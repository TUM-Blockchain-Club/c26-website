name: "Deploy Production"

on:
  push:
    branches:
      - main
  repository_dispatch:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prod:
    name: "prod"
    runs-on: ubuntu-latest
    environment: prod
    env:
      HAS_VERCEL_SECRETS: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Skip GitHub Actions deploy
        if: env.HAS_VERCEL_SECRETS != 'true'
        shell: bash
        run: |
          echo "Skipping Vercel CLI deploy because Vercel GitHub secrets are not fully configured."
          echo "The site can still deploy through Vercel's Git integration."

      - name: Checkout
        if: env.HAS_VERCEL_SECRETS == 'true'
        uses: actions/checkout@v4.1.7

      - name: Setup Node
        if: env.HAS_VERCEL_SECRETS == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        if: env.HAS_VERCEL_SECRETS == 'true'
        shell: bash
        run: corepack enable

      - name: Install Vercel CLI
        if: env.HAS_VERCEL_SECRETS == 'true'
        shell: bash
        run: npm i -g vercel

      - name: Install Dependencies
        if: env.HAS_VERCEL_SECRETS == 'true'
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information
        if: env.HAS_VERCEL_SECRETS == 'true'
        shell: bash
        run: vercel pull --environment=production --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: env.HAS_VERCEL_SECRETS == 'true'
        shell: bash
        run: vercel deploy --public --yes --prod --logs --token=${{ secrets.VERCEL_TOKEN }}
